<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <!-- Dark background -->
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#05020d"/>
    </radialGradient>

    <!-- Planet body gradient -->
    <radialGradient id="planetGrad" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#c07fff"/>
      <stop offset="35%" stop-color="#8b36e8"/>
      <stop offset="75%" stop-color="#5a1ab0"/>
      <stop offset="100%" stop-color="#2d0a70"/>
    </radialGradient>

    <!-- Planet ambient glow -->
    <radialGradient id="planetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b2fff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3a0099" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer halo -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5b1aaa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a0050" stop-opacity="0"/>
    </radialGradient>

    <!-- Highlight glint -->
    <radialGradient id="glint" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip planet circle -->
    <clipPath id="planetClip">
      <circle cx="96" cy="78" r="36"/>
    </clipPath>

    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c09fff" stop-opacity="0.15"/>
      <stop offset="30%" stop-color="#d8b4ff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#e8d0ff" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#c09fff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9b70e0" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="192" height="192" rx="36" fill="#060010"/>
  <rect width="192" height="192" rx="36" fill="url(#bgGlow)"/>

  <!-- Stars -->
  <circle cx="22" cy="18" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="55" cy="12" r="0.6" fill="#d8b4ff" opacity="0.5"/>
  <circle cx="140" cy="20" r="0.9" fill="#ffffff" opacity="0.7"/>
  <circle cx="168" cy="15" r="0.6" fill="#ffffff" opacity="0.4"/>
  <circle cx="178" cy="35" r="0.7" fill="#d8b4ff" opacity="0.5"/>
  <circle cx="14" cy="52" r="0.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="170" cy="58" r="0.8" fill="#ffffff" opacity="0.55"/>
  <circle cx="38" cy="130" r="0.7" fill="#d8b4ff" opacity="0.4"/>
  <circle cx="155" cy="118" r="0.6" fill="#ffffff" opacity="0.45"/>
  <circle cx="182" cy="95" r="0.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="10" cy="100" r="0.6" fill="#d8b4ff" opacity="0.35"/>
  <circle cx="72" cy="22" r="0.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="120" cy="16" r="0.5" fill="#d8b4ff" opacity="0.4"/>
  <circle cx="30" cy="70" r="0.4" fill="#ffffff" opacity="0.3"/>
  <circle cx="160" cy="75" r="0.4" fill="#ffffff" opacity="0.3"/>
  <circle cx="88" cy="155" r="0.5" fill="#d8b4ff" opacity="0.3"/>
  <circle cx="135" cy="148" r="0.4" fill="#ffffff" opacity="0.25"/>

  <!-- Outer halo glow behind planet -->
  <ellipse cx="96" cy="78" rx="52" ry="52" fill="url(#halo)"/>

  <!-- Ring back half (behind planet) -->
  <ellipse cx="96" cy="82" rx="58" ry="10" fill="none"
    stroke="url(#ringGrad)" stroke-width="2.5" opacity="0.6"
    clip-path="url(#ringBack)"/>
  <!-- Clip for ring back: only top half visible behind planet -->
  <defs>
    <clipPath id="ringBack">
      <rect x="20" y="55" width="152" height="27"/>
    </clipPath>
    <clipPath id="ringFront">
      <rect x="20" y="82" width="152" height="30"/>
    </clipPath>
  </defs>

  <!-- Ring back strokes -->
  <ellipse cx="96" cy="82" rx="58" ry="10" fill="none"
    stroke="#c8a0f0" stroke-width="1.2" opacity="0.35"
    clip-path="url(#ringBack)"/>
  <ellipse cx="96" cy="82" rx="53" ry="8.5" fill="none"
    stroke="#d8b8ff" stroke-width="0.8" opacity="0.25"
    clip-path="url(#ringBack)"/>

  <!-- Planet glow aura -->
  <circle cx="96" cy="78" r="46" fill="url(#planetGlow)" opacity="0.7"/>

  <!-- Planet body -->
  <circle cx="96" cy="78" r="36" fill="url(#planetGrad)"/>

  <!-- Subtle planet shading overlay -->
  <circle cx="96" cy="78" r="36" fill="#1a0050" opacity="0.18"/>

  <!-- Highlight glint (top-left) -->
  <ellipse cx="83" cy="66" rx="10" ry="8" fill="url(#glint)" opacity="0.55"/>

  <!-- Small bright star dots on planet -->
  <circle cx="88" cy="72" r="1.8" fill="#ffffff" opacity="0.9"/>
  <circle cx="93" cy="70" r="1.0" fill="#ffffff" opacity="0.75"/>
  <circle cx="85" cy="76" r="0.6" fill="#ffffff" opacity="0.5"/>

  <!-- Ring front strokes (in front of planet) -->
  <ellipse cx="96" cy="82" rx="58" ry="10" fill="none"
    stroke="#c8a0f0" stroke-width="2.2" opacity="0.55"
    clip-path="url(#ringFront)"/>
  <ellipse cx="96" cy="82" rx="53" ry="8.5" fill="none"
    stroke="#e0c8ff" stroke-width="1.0" opacity="0.3"
    clip-path="url(#ringFront)"/>
  <ellipse cx="96" cy="82" rx="63" ry="11.5" fill="none"
    stroke="#b090e0" stroke-width="1.0" opacity="0.2"
    clip-path="url(#ringFront)"/>

  <!-- Text: "mentally" bold white -->
  <text x="96" y="136"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="700"
    fill="#f5f0ff"
    letter-spacing="0.5">mentally</text>

  <!-- Text: "prepare" italic purple -->
  <text x="96" y="154"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-style="italic"
    font-weight="400"
    fill="#c084fc"
    letter-spacing="0.5">prepare</text>
</svg>