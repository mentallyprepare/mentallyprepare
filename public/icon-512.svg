<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark background -->
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#05020d"/>
    </radialGradient>

    <!-- Planet body gradient -->
    <radialGradient id="planetGrad" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#c07fff"/>
      <stop offset="35%" stop-color="#8b36e8"/>
      <stop offset="75%" stop-color="#5a1ab0"/>
      <stop offset="100%" stop-color="#2d0a70"/>
    </radialGradient>

    <!-- Planet ambient glow -->
    <radialGradient id="planetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b2fff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3a0099" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer halo -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5b1aaa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a0050" stop-opacity="0"/>
    </radialGradient>

    <!-- Highlight glint -->
    <radialGradient id="glint" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c09fff" stop-opacity="0.15"/>
      <stop offset="30%" stop-color="#d8b4ff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#e8d0ff" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#c09fff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9b70e0" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Clip for ring back: only top half visible behind planet -->
    <clipPath id="ringBack">
      <rect x="55" y="148" width="402" height="70"/>
    </clipPath>
    <clipPath id="ringFront">
      <rect x="55" y="218" width="402" height="80"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="#060010"/>
  <rect width="512" height="512" rx="96" fill="url(#bgGlow)"/>

  <!-- Stars -->
  <circle cx="58"  cy="48"  r="2.1" fill="#ffffff" opacity="0.6"/>
  <circle cx="146" cy="32"  r="1.6" fill="#d8b4ff" opacity="0.5"/>
  <circle cx="373" cy="54"  r="2.4" fill="#ffffff" opacity="0.7"/>
  <circle cx="448" cy="40"  r="1.6" fill="#ffffff" opacity="0.4"/>
  <circle cx="474" cy="92"  r="1.9" fill="#d8b4ff" opacity="0.5"/>
  <circle cx="37"  cy="138" r="1.4" fill="#ffffff" opacity="0.4"/>
  <circle cx="453" cy="154" r="2.1" fill="#ffffff" opacity="0.55"/>
  <circle cx="100" cy="346" r="1.9" fill="#d8b4ff" opacity="0.4"/>
  <circle cx="413" cy="314" r="1.6" fill="#ffffff" opacity="0.45"/>
  <circle cx="485" cy="252" r="1.4" fill="#ffffff" opacity="0.3"/>
  <circle cx="26"  cy="266" r="1.6" fill="#d8b4ff" opacity="0.35"/>
  <circle cx="192" cy="58"  r="1.4" fill="#ffffff" opacity="0.4"/>
  <circle cx="320" cy="42"  r="1.4" fill="#d8b4ff" opacity="0.4"/>
  <circle cx="80"  cy="186" r="1.1" fill="#ffffff" opacity="0.3"/>
  <circle cx="426" cy="200" r="1.1" fill="#ffffff" opacity="0.3"/>
  <circle cx="234" cy="412" r="1.4" fill="#d8b4ff" opacity="0.3"/>
  <circle cx="360" cy="394" r="1.1" fill="#ffffff" opacity="0.25"/>
  <circle cx="490" cy="160" r="1.3" fill="#ffffff" opacity="0.35"/>
  <circle cx="22"  cy="80"  r="1.2" fill="#d8b4ff" opacity="0.4"/>
  <circle cx="500" cy="310" r="1.0" fill="#ffffff" opacity="0.28"/>

  <!-- Outer halo glow behind planet -->
  <ellipse cx="256" cy="208" rx="138" ry="138" fill="url(#halo)"/>

  <!-- Ring back strokes (behind planet) -->
  <ellipse cx="256" cy="218" rx="154" ry="26" fill="none"
    stroke="#c8a0f0" stroke-width="3.2" opacity="0.35"
    clip-path="url(#ringBack)"/>
  <ellipse cx="256" cy="218" rx="141" ry="22" fill="none"
    stroke="#d8b8ff" stroke-width="2.0" opacity="0.25"
    clip-path="url(#ringBack)"/>

  <!-- Planet glow aura -->
  <circle cx="256" cy="208" r="122" fill="url(#planetGlow)" opacity="0.7"/>

  <!-- Planet body -->
  <circle cx="256" cy="208" r="96" fill="url(#planetGrad)"/>

  <!-- Subtle planet shading overlay -->
  <circle cx="256" cy="208" r="96" fill="#1a0050" opacity="0.18"/>

  <!-- Highlight glint (top-left) -->
  <ellipse cx="220" cy="175" rx="26" ry="21" fill="url(#glint)" opacity="0.55"/>

  <!-- Small bright star dots on planet surface -->
  <circle cx="235" cy="192" r="4.8" fill="#ffffff" opacity="0.9"/>
  <circle cx="248" cy="186" r="2.7" fill="#ffffff" opacity="0.75"/>
  <circle cx="226" cy="202" r="1.6" fill="#ffffff" opacity="0.5"/>

  <!-- Ring front strokes (in front of planet) -->
  <ellipse cx="256" cy="218" rx="154" ry="26" fill="none"
    stroke="#c8a0f0" stroke-width="5.8" opacity="0.55"
    clip-path="url(#ringFront)"/>
  <ellipse cx="256" cy="218" rx="141" ry="22" fill="none"
    stroke="#e0c8ff" stroke-width="2.6" opacity="0.3"
    clip-path="url(#ringFront)"/>
  <ellipse cx="256" cy="218" rx="168" ry="30" fill="none"
    stroke="#b090e0" stroke-width="2.6" opacity="0.2"
    clip-path="url(#ringFront)"/>

  <!-- Text: "mentally" bold white -->
  <text x="256" y="362"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="700"
    fill="#f5f0ff"
    letter-spacing="1.5">mentally</text>

  <!-- Text: "prepare" italic purple -->
  <text x="256" y="412"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48"
    font-style="italic"
    font-weight="400"
    fill="#c084fc"
    letter-spacing="1.5">prepare</text>
</svg>